OOPs:`
----

OOP (Object-Oriented Programming) is a programming method that structures software by designing objects, where each 
object contains data (properties) and behavior (methods)

Class:

> Template/blueprint for creating an object.
> variables(properties) and methods are the members of the class.

>> Property: Stores the data about an object
ex: car 
door
engine

>> method(): function inside a class that defines action of the object.
ex: car
close()
accelerate()


> Object:

 refers to instance of the class.

let obj=new classname()

> Constructor()->Constructor is a special method in a class used to initialize object
 properties automatically when an object is created.

types
-----

1) Default Constructor()

Constructor without parameters.

ex:class Employee {
  constructor() {
    console.log("Default Constructor Called");
  }
}

let obj1 = new Employee()

2) Parameterized Constructor()

Constructor with parameters to pass values during object creation.

class Employee {
  name:string="sindu"

  constructor(empName:string) {
    this.name = empName;
    console.log(this.name);
  }
}

let obj2 = new Employee("Sindhu");


