Steps to find the field in salesforce :
----------------------------------------

From Salesforce Setup (Recommended)

Log in to your Salesforce Developer Org.

Go to Setup → Object Manager.

Search for and click on Lead.

Open Fields & Relationships.

You will see a list of all the fields available on the Lead object.

The Field Label is what you see in the UI (e.g., “Last Name”).

The Field Name is what you use in the API (e.g., LastName, Company).

These “Field Names” are what you should use in your JSON request body.

or 

path:
-----
https://orgfarm-6d28dcc693-dev-ed.develop.my.salesforce-setup.com/lightning/setup/ObjectManager/Lead/FieldsAndRelationships/view

✅ Example:

{

  "LastName": "s",
  "Company": "Testleaf",
  "Email": "yuva@gmail.com",
  "Phone": "8789765426"
}


