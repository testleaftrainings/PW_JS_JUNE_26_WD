API Notes :
----------

REST -> Represtational State Transfer
REST uses HTTP standard methods (GET, POST, PUT, DELETE) to perform CRUD operations.

API -> Apllication Programming Interface :
API Testing verifies backend logic, data transfer, and responses by testing APIs 
directly without using the UI.


UI -> Customer facing interface
API -> Middle ware 



Five Steps process for API testing
------------------------------------

1. Documentation
: Understanding the API's purpose, structure, and usempId guidelines before testing.
Example: 
: Reading Swagger docs that describe how the incident API works in an application.

2. Endpoints: 
: Specific URLs that represent resources or actions to be tested.
Example: 
: https://dev356721.service-now.com/api/now/table/incident (incident resource).

3. Methods: 
: HTTP operations (GET, POST, PATCH, PUT, DELETE, etc.) that define the type of action on 
the resource.
Example: 
: GET /incident → fetch incidents; POST /incident → create a new incident.

4. Headers: 
: Metadata sent with requests or responses to control and describe API behavior.
Example: 
Content-Type: application/json, Accept: application/json.

5. Authorization: 
: Security mechanism to verify and allow only valid users or systems to access the API.
Example: 
Authorization: Bearer <token> or Basic Auth with username & password.

Together, these 5 steps ensure your API test covers what, where, how, and who can access the
 service.
