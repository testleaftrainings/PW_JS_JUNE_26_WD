Test Annotations:
-----------------

Test annotations are used to configure the behavior of a test during execution

test.only() -> Execute only this test and ignore the rest.
ex:
test.only('test name', async ({ page }) => {
   // test steps
});


test.skip() -> is a Playwright test annotation used to skip a specific test, 
so Playwright will not execute it.
ex:
test.skip('test name', async ({ page }) => {
   // test steps
});


test.fail() -> is a Playwright test annotation used when you expect the test to fail.
ex:
test.fail('test name', async ({ page }) => {
   // test steps
});

Note:
-----
If the test fails → Playwright marks it as passed (because failure was expected).
If the test passes → Playwright marks it as failed.


test.fixme() -> is a Playwright test annotation used when a test is known to be broken or
 not ready, and you want Playwright to skip it temporarily
ex:
test.fixme('test name', async ({ page }) => {
  // test steps
});


test.use() -> override context /test.use() is used to apply specific configuration settings
 for a test or group of tests
ex:
test.use({ storageState: 'loginAuth.json' });

test('Open Home Page', async ({ page }) => {
  await page.goto('https://example.com/home');
});



test.info -> it shows additional information/metadata about the test during execution of test.
import { test, expect } from '@playwright/test';

test('Login Test', async ({ page }) => {

  console.log(test.info().title);      //Login Test

  await page.goto('https://example.com');
});  



test.slow-> Playwright test annotation used to mark a test as slow, so Playwright increases the timeout for that test.
ex:
import { test, expect } from '@playwright/test';
test('Slow loading page test', async ({ page }) => {

  test.slow(); // marks this test as slow

  await page.goto('https://example.com');
  await page.waitForTimeout(20000); // simulate slow operation
});