Operators:

Operators are special symbols used to perform operations on values (operands)

1) Arithmetic Operators: Used for mathematical calculations.

ex:
10 + 5   // 15 (addition)
10 - 5   // 5  (subtraction)
10 * 5   // 50 (multiplication)
10 / 5   // 2  (division)
10 % 3   // 1  (remainder)

Use: calculations like age, marks, salary

2) Assignment Operators: Used to assign values to variables

ex:
let x = 10;   // assign
x += 5;       // x = x + 5 → 15
x -= 2;       // x = x - 2 → 13
x *= 2;       // x = x * 2 → 26
x /= 2;       // x = x / 2 → 13

Use: updating values

3) Comparison Operators: Used to compare values (returns true/false)

10 == "10"   // true  (Loose equality, checks only the value)
10 === "10"  // false (Strict equality , checks both value + data type)

10 != 5      // true
10 > 5       // true
10 < 5       // false
10 >= 10     // true
10 <= 9      // false

Use: conditions in if/else

4. Logical Operators: Used to combine multiple conditions.

true && true   // true  (AND)
true || false  // true  (OR)
!true          // false (NOT)

ex:
age >= 18 && age <= 60

Use: multiple condition checks

5. Unary Operators (Increment / Decrement) : Unary operators work on single operand.

Pre-increment ->increments first and then assign
++a

ex: 
let a = 5;
console.log(++a)

Post-increment-> use first and then increment
a++

let x = 10;
console.log(x++);
console.log(x)

Pre-decrement -> ->decrement first and then assign
--d

ex: 
let d = 5;
console.log(--d)
console.log(d)

Post decrement -> use first and then decrement
c--

ex:
let c = 5;
console.log(c--);
console.log(c);

use: used in clicks, steps, iterations


| Type  | Action         | Output behavior      |
| ----- | -------------- | -------------------- |
| `++i` | increase first | prints updated value |
| `i++` | use first      | prints old value     |


Conditional Statements:
-----------------------

Conditional statements are used to make decisions in code.

Based on a condition (true/false)
JavaScript decides which block to execute

types:
------

1) if-else -> Used for multiple conditions (range, complex logic, expressions)

 if(condition1){
     }
   else if (condition2){
      } 
   else {
   }


2) Switch -> used for multiple exact value comparisons or matching.

syntax:

switch (key) {
    case value:
        
        break;

    default:
        break;
}

| Feature       | if-else                  | switch                   |
| ------------- | ------------------------ | ------------------------ |
| Type of check | Conditions & expressions | Exact match              |
| Best for      | ranges, complex logic    | fixed values             |
| Readability   | can become messy         | cleaner for many options |
| Performance   | slower for many checks   | faster for many cases    |
| Operators     | supports `&&`, `<`, `>`  | not supported            |


Looping Statements:
-------------------

Looping statements
------------------

Looping statements are used to execute a block of code repeatedly based on a condition.

1) For Loop : used when we know the iterations in advance

syntax:
-------

for (initialization; condition; increment/decrement) { 
//code to execute 
}  

    
2) while Loop : A while loop is used when the number of iterations is unknown, and execution 
continues as long as the given condition is true

syntax:
-------

while (condition) {
  // code to execute
}

Ex: 

while(hasNextPage){
await page.locator(`.navgbutton`).click()
hasNextPage = await page.locator(`.navgbutton`).isEnabled() // Here verification 
} 


