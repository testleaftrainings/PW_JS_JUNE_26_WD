Polymorphism: Polymorphism is the ability of a method to have different behaviors based on 
the context or class.

polymorphism->many+forms

types:
------

1) Method overloading(compile time polymorphism)
2) Method overriding(runtime polymorphism)


Method overloading:
------------------

Method Overloading means having multiple methods with the same name but different parameters 
(type, number, or order).
It allows the same method name to perform different actions based on the input.

TypeScript supports method overloading only at the type level (signatures), not true runtime 
overloading like Java.
You can declare multiple method signatures, But only one actual implementation is allowed


class Calculator {
  add(a: number, b: number): number;  //signature
  add(a: string, b: string): string;  //signature

  // single implementation-1
  add(a: any, b: any): any {
    return a + b;
  }
}

or

//single implementation-2
add(a: number | string, b: number | string): number | string {

if (typeof a === "number" && typeof b === "number") {
return a + b;
 } else {
  return a.toString() + b.toString();
 }
 }

const c = new Calculator();
console.log(c.add(5, 10));       // 15
console.log(c.add("Hi ", "All"))// Hi All



Method overriding:
------------------
Method overriding is achieved using inheritance, where a child class provides its own 
implementation for a method with the same name and parameters as defined in the
 parent class.

//Different browsers behave differently

class Browser {
    launch() {
        console.log("Launching browser");
    }
}

class Chrome extends Browser {
    launch() {
        console.log("Launching Chrome browser");
    }
}

class Edge extends Browser {
    launch() {
        console.log("Launching Edge browser");
    }
}

new Chrome().launch();

a->b
->c



