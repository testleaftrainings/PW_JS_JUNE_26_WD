1️⃣ includes() ⭐ 

Checks if a string contains a value.

let course = "Playwright";

console.log(course.includes("wright")); // true
console.log(course.includes("Java"));   // false


👉 Used in:

Validation

API response checks

UI text verification

let apiStatus = "201 Created";

console.log(apiStatus.includes("201")); // true
console.log(apiStatus.includes("404")); // false

