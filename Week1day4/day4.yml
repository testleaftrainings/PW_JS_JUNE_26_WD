JavaScript "String" Notes :


Difference between string literal and object literal :
------------------------------------------------------

We will look into new String() not because we use it in real automation projects, but because it helps understand how 
JavaScript handles primitives vs objects, which prevents bugs in frameworks like Playwright.

The real concept to learn is :

Primitive vs Object

Primitive string:

let a = "Testleaf";
let b = "Testleaf";

console.log(a === b); // O/P => true => Because primitives are compared by value.

Object string:

let a = new String("Testleaf");
let b = new String("Testleaf");

console.log(a === b); // O/P => false => Because JavaScript compares object reference (memory location).
---------------------------------------
"==="

1. reference comparison

| Type      | What `===` Compares |
| --------- | ------------------- |
| Primitive | Value + Type        |
| Object    | Memory reference    |
--------------------------------------------------------------------------------

2. memory allocation

| Type      | Stored In Variable | Memory Location   |
| --------- | ------------------ | ----------------- |
| Primitive | Actual value       | Stack (generally) |
| Object    | Reference          | Heap              |

---------------------------------------------------

//String literal : 

let companyName = "Testleaf"; // address : 100
let firmName = "Testleaf"; // address : 100

//Object literal :

let companyNameObj = new String(`Testleaf`) // address : 101
let firmNameObj = new String(`Testleaf`)  // address : 102

