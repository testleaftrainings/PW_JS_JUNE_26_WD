2️⃣ startsWith() & endsWith()
console.log(course.startsWith("Play"));  // true
console.log(course.endsWith("right"));   // true


👉 Very useful in test automation assertions.

-------------------------------

3️⃣ toUpperCase() / toLowerCase() 
let name = "PlayWright";

console.log(name.toLowerCase()); // playwright
console.log(name.toUpperCase()); // PLAYWRIGHT


👉 Used for case-insensitive comparison.

-------------------------------

4️⃣ trim() / trimStart() / trimEnd() ⭐

Very important for real projects.

let userInput = "   shiva   ";

console.log(userInput.trim());      // "shiva"
console.log(userInput.trimStart()); // removes leading spaces
console.log(userInput.trimEnd());   // removes trailing spaces


👉 Used when validating form inputs.

-------------------------------

5️⃣ replace() ⭐

Very important.

let text = "Playwright is good";

console.log(text.replace("good", "powerful"));
// Playwright is powerful


Important concept:

let str = "test test test";
console.log(str.replace("test", "run"));     // replaces first only //run test test
console.log(str.replaceAll("test", "run"));  // replaces all //run run run

-------------------------------

6️⃣ split()  (You already used it in reverse )

Explicitly:

let sentence = "I love Playwright";

console.log(sentence.split(" "));
// ["I", "love", "Playwright"]


👉 Used for:

Parsing CSV

Data extraction

Tokenization

