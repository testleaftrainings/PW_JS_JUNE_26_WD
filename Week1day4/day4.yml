Difference between slice() and substring()


| Feature           | `slice()`                 | `substring()`         |
| ----------------- | ------------------------- | --------------------- |
| Start Index       | Included                  | Included              |
| End Index         | Not included              | Not included          |
| If `start > end`  | Returns empty string `""` | Swaps the values      |
| Negative Index    | Allowed                   | Not allowed           |
| Negative Handling | Counts from end           | Treated as `0`        |
| Swapping          | Does NOT swap             | Swaps automatically   |
| Common Use        | Modern & flexible         | Older method          |


Real Reason JavaScript has both substring() and slice() substring() came first (old JavaScript)

Early JavaScript designers created:

substring()

But developers later wanted:

negative indexes

more predictable behavior

So JavaScript introduced:

slice()

But they couldn't remove substring() because it would break millions of existing websites.

So both remain in the language.
