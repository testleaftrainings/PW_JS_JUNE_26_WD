Difference between concatenation "+" and template literal `${}`
---------------------------------------------------------------

Example:

let price = 100;
let quantity = 3;

console.log(`Total price is ${price * quantity}`);

Output

Total price is 300

Doing the same with + becomes messy:

console.log("Total price is " + (price * quantity));

---------------

Which is easier to read?

"User " + name + " has logged in at " + time

vs

`User ${name} has logged in at ${time}`

