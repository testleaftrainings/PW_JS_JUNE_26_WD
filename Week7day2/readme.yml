Different types of variable setting in API testing (Postman):
------------------------------------------------------------

1) Global Variables

Used across all collections and environments.
Example: Token, common URL.

let responsebody = pm.response.json();
let InstUrl = responsebody.instance_url;
pm.globals.set("Ins_URL", InstUrl);

EX: {{Ins_URL}}

2) Environment Variables

Used for specific environments like Dev, QA, Prod.
Example: Lead ID, base_url, username.

let LeadResponse = pm.response.json();
let LDres = LeadResponse.id;
pm.environment.set("Lead_ID", LDres);

EX: {{Lead_ID}}

3) Collection Variables

Available only inside one collection.
Used for shared values within that API project.

let responsebody = pm.response.json();
let AccessToken = responsebody.access_token;
pm.collectionVariables.set("Acc_Token", AccessToken);

Ex: {{Acc_Token}}