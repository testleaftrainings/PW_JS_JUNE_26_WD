Steps to generate an OAuth token
Log in to your ServiceNow instance with an account that has the required administrative 
permissions. Navigate to All → System OAuth → Application Registry → New, 
then choose Create an OAuth API endpoint for external clients. 
ServiceNow documents this as the setup for inbound OAuth clients.
 
In Postman, create a POST request to the token endpoint:

https://YOUR_INSTANCE.service-now.com/oauth_token.do

Under Body → x-www-form-urlencoded, for a user-credential/password grant setup, provide:
grant_type     password
client_id      YOUR_CLIENT_ID
client_secret  YOUR_CLIENT_SECRET
username       YOUR_SERVICENOW_USERNAME
password       YOUR_SERVICENOW_PASSWORD
 

