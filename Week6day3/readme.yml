Custom fixture:
---------------

page,context, request -> inbuilt fixture of Playwright
customized fixture

browser->newcontext->newpage

Custom fixture in Playwright is a reusable setup block.
It helps you write common steps once (like login) and reuse them in multiple tests.

Steps to create custom fixture:
-------------------------------

Import → Extend → Define → Perform actions → Use


Step 1: Import required modules

ex: import { test as login} from '@playwright/test'

Step 2: Create custom fixture
extend the playwright test to define new fixture

export const customFixture = login.extend<{ salesForceLogin: any }>({})

Step 3: Define fixture function
create the async function with page and use to write the logic.

salesForceLogin: async ({ page }, use) => {

Step 4: Perform actions (Login steps)

Open URL
Enter username & password
Click login
Wait for page load

step 5: Use the fixture
await use(page)

