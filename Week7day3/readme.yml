📑 Agenda for Week7 Day3 - Playwright with API ServiceNow


Parameter: Parameters in API are values sent with a request to pass data, filter results, 
identify records, or control behavior.

Path Parameter and query Parameter:
Url / ->  Path Parameter
?  -> query parameter

ex:

https://dev231684.service-now.com/api/now/table/incident/d43c58cbc3d00f108a6af5fc050131d9?sysparm_fields=description

URL= https://dev231684.service-now.com
path=/api/now/table/incident (identifies specific resource inside URL)
Query= sysparm_fields=description  => sent after ? in the url used to filter, search and sort the data.



