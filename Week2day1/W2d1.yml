Functions:
---------

A function in JavaScript is a reusable block of code used to perform a specific task and there by

Avoid code repetition
Improve readability

syntax:
-------

function funName(){

}
funName()


types of function:
------------------

1) Named function/ function declaration
2) Function expression/Anonymous function
3) Arrow function
4) callback function


Named Function:
---------------

A function consists of six main components: function keyword, function name, parameters, function body, function call, 
and arguments. 
The function keyword declares the function, the name identifies it, parameters receive values, the body contains the logic,
the function call executes it, and arguments are the actual values passed during execution
A function can accept all the datatypes as an argument.

ex:
----

function add(num1, num2) {
    console.log(num1 + num2);
}

add(10, 20);


function → Function Keyword
add → Function Name
num1, num2 → Parameters
{ console.log(num1 + num2); } → Function Body
add(10, 20) → Function Call
10, 20 → Arguments

>> Diff between parameter and argument in a function.

| Parameter                          | Argument                          |
| ---------------------------------- | --------------------------------- |
| Declared in function definition    | Passed during function call       |
| Placeholder variable               | Actual value                      |
| Receives data                      | Sends data                        |
| Exists inside function declaration | Exists inside function invocation |

Note: placeholder is an empty variable that waits for a value


>> Diff between console.log() and return inside a function.

| console.log()       | return                        |
| ------------------- | ----------------------------- |
| Prints output       | Sends value back              |
| Function continues  | Function ends immediately     |
| Cannot store result | Can store result              |
| Used for debugging  | Used for actual program logic |
| Returns undefined   | Returns specified value       |


Function Expression:
--------------------

A Function Expression is a function that is assigned to a variable and can be called using that variable name.

let funexp= function(x,y){
     return x+y   
    }

    funexp()


Arrow Function
--------------

An Arrow Function is a concise way of writing a function using the => operator. It reduces code length and is widely
 used in modern JavaScript, especially with callbacks and array methods


 ex: 

 let add=(x,y)=>(x+y)
console.log(add(2,3)); //5


Callback Function
-----------------

A callback function is a function that is passed as an argument to another function and is executed later by that function.

Ex:

function login(username, password, callback) {
    console.log("Login Successful");
    callback();
}

function takeScreenshot() {
    console.log("Screenshot Captured");
}

login("admin", "admin123", takeScreenshot);  

