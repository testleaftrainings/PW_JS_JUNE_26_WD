Arrays
------

An array in JavaScript is a special type of object used to store multiple values in a single variable.
Each value (called an element) has an index, starting from 0.

ex:let fruits = ['apple', 'banana', 'cherry'];
   console.log(fruits[0]); // 'apple'


   Key Features of JavaScript Arrays
   ----------------------------------

1) Dynamic in size — you can add or remove elements anytime.

2) Heterogeneous in Nature-Can store different data types together as an single array
Ex: let mixed = [10, 'apple', true, { name: 'John' }];

3) Zero-based index — first element is at index 0.

4) Internally objects — JS arrays are not fixed memory blocks like in C/C++/Java.

5) Provides built-in methods like push(), pop(),shift(), unshift(), slice(), splice()


Array methods:
--------------

1. push() - Add element at end
let arr = [1, 2];
arr.push(3);

console.log(arr); // [1,2,3]

2. pop() - Remove last element
let arr = [1, 2, 3];
arr.pop();

console.log(arr); // [1,2]

3. unshift() - Add element at beginning
let arr = [2, 3];
arr.unshift(1);

console.log(arr); // [1,2,3]

4. shift() - Remove first element
let arr = [1, 2, 3];
arr.shift();

console.log(arr); // [2,3]

5. includes() - Check value exists
let arr = [10, 20, 30];

console.log(arr.includes(20)); // true

6. indexOf() - Find index
let arr = [10, 20, 30];

console.log(arr.indexOf(20)); // 1

7. lastIndexOf() - Find last occurrence
let arr = [10, 20, 10];

console.log(arr.lastIndexOf(10)); // 2

8. join() - Convert array to string
let arr = ["Java", "Script"];

console.log(arr.join("-")); // Java-Script

9. reverse() - Reverse array
let arr = [1, 2, 3];

console.log(arr.reverse()); // [3,2,1]

10. sort() - Sort array
let arr = [5, 1, 3];

console.log(arr.sort()); // [1,3,5]

11. slice() - Extract portion
let arr = [10, 20, 30, 40];

console.log(arr.slice(1, 3)); // [20,30]

12. splice() - Add/Remove elements
let arr = [10, 20, 30];

arr.splice(1, 1);
console.log(arr); // [10,30]

13. concat() - Merge arrays
let a = [1, 2];
let b = [3, 4];

console.log(a.concat(b)); // [1,2,3,4]

14. toString() - Array to string
let arr = [1, 2, 3];

console.log(arr.toString()); // 1,2,3

15. Array.isArray() - Check array
let arr = [1, 2, 3];

console.log(Array.isArray(arr)); // true


