Commonly used Commands :
------------------------

To create a playwright file - filename.spec.ts

To run the test file - npx playwright test filename.spec.ts

To open the test report - npx playwright show-report

Default mode - headless


Maximize Screen size in chromium : 
--------------------------------

  {
      name: 'chromium',
      use: { browserName:"chromium", 
        viewport:null, // disable the deafult 1280x720
        launchOptions:{
          args:['--start-maximized'],
        },
      },
    }, 



/// <reference types="node" /> 

Above command tells TypeScript to include Node.js type definitions from @types/node. 
This allows TypeScript to recognize Node.js globals such as process, Buffer, and __dirname, 
preventing compilation errors like 'Cannot find name process'


Features of Playwright Tool:
----------------------------

Microsoft Open Source Tool
Cross-browser automation (Chromium, Firefox, WebKit)
Cross-platform support (Windows, Linux, macOS)
Auto-waiting capability
Built-in Test Runner
Supports multiple programming languages (JavaScript, TypeScript, Java, Python, .NET)
API Testing support
Mobile device emulation
Network interception and mocking
Screenshots and video recording
Trace Viewer for debugging
Multiple Browser Contexts (isolated sessions)
Headless and Headed execution
Automatic retries for flaky tests

Priority of execution
----------------------

1. Script Level : chromium.launch({channel:"msedge",headless:false})

2. Terminal Command  :npx playwright test filename.spec.ts --project=firefox

3. Configuration file(playwright.config.ts) :  projects: [{
                                                          name: 'chromium',
                                                           use: { ...devices['Desktop Chrome'] },
                                                         }]

