Callback Hell:
--------------

Callback Hell is a situation where multiple asynchronous operations are nested inside callbacks, 
creating deeply indented code that is difficult to read, maintain, and debug. 


function first(cb) {
  console.log("First Function");
  cb();
}

function second(cb) {
  console.log("Second Function");
  cb();
}

function third() {
  console.log("Third Function");
}

first(() => {
  second(() => {
    third();
  });
});


//To avoid the callback- callback hell -> Promise was introduced.

Promise
--------

Promise is a JavaScript object used to handle asynchronous operations (like API calls, 
file read, timers) and gives a result in the future

//syntax 

let foodAvailable = false;

let promise = new Promise((resolve, reject) => {
  if (foodAvailable) {
    resolve("food is ready");
  } else {
    reject("no delivery");
  }
});

promise
  .then(result => console.log(result)) //handel succeeds -> reslove
  .catch(error => console.log(error))  // handles error -> reject

Promise States:
---------------
1. Pending   -> Initial state
2. Fulfilled -> resolve() called
3. Rejected  -> reject() called


Async/Await (introduced in ES2017)
----------------------------------
async/await was introduced in ES2017, async function always returns a Promise and await pauses 
execution until the Promise is resolved or rejected.

ex:

async function data(){

await page.goto("url")
await page.locator("username").fill("demomanager")

}


 Browser -> Context -> Page
 ----------------------------

Browser: Actual browser engine (Chromium, Firefox, WebKit)

Context: Isolated environment like an incognito session

Page: A single tab within a context

const browser=await chromium.launch({headless:false}) //or channel:"msedge"
const context=await browser.newContext()
const page=await context.newPage()


What is a page fixture :
------------------------
In Playwright,a page fixture is a predefined setup that provides a fresh browser page for each 
test. It ensures that tests run in isolation, preventing interference from previous tests. 
The page fixture is part of Playwright's test runner and is automatically available in test functions.

Page fixture automatically creates:
-----------------------------------
Browser → Context → Page

Example:
test('Login', async ({ page }) => {
   await page.goto('https://amazon.in');
});

